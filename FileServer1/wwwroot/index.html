<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Serverus Drive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    /* Modal entry animation */
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(-12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }
    .modal-panel { animation: modalIn 0.2s ease-out; }
    /* Prevent body scroll when modal open */
    body.modal-open { overflow: hidden; }

    /* Mobile floating drawer (hamburger menu) */
    @media (max-width: 767px) {
      #sidebar.mobile-drawer {
        position: fixed;
        z-index: 50;
        top: 3.25rem;
        bottom: 0.75rem;
        left: 0.5rem;
        width: 18rem;
        border-radius: 1.25rem;
        box-shadow: 0 25px 50px rgba(0,0,0,0.35);
        transform: translateX(-110%);
        opacity: 0;
        transition: transform 0.18s ease, opacity 0.18s ease;
        border: 1px solid rgba(55, 65, 81, 0.9); /* border-gray-700-ish */
        overflow-y: auto;
      }
      #sidebar.mobile-drawer.open {
        transform: translateX(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

  <!-- ═══════════════════════ TOP HEADER ═══════════════════════ -->
  <header class="bg-gray-900 border-b border-gray-800 px-5 py-3 flex items-center gap-4 sticky top-0 z-20 flex-shrink-0">
    <!-- Mobile hamburger -->
    <button id="hamburgerBtn" class="md:hidden p-2 rounded-lg hover:bg-gray-800 text-gray-300" title="Menu" aria-label="Open menu">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <!-- Logo -->
    <div class="flex items-center gap-2.5 flex-shrink-0">
      <span class="font-semibold text-base tracking-tight hidden sm:block">Serverus Drive</span>
    </div>
    <!-- Search -->
    <div class="flex-1 max-w-md">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="searchInput" type="text" placeholder="Search files…" autocomplete="off"
          class="w-full bg-gray-800 text-sm text-gray-300 placeholder-gray-500 rounded-lg pl-9 pr-4 py-2 border border-gray-700 focus:outline-none focus:border-indigo-500 transition" />
      </div>
    </div>
  </header>

  <!-- ═══════════════════════ BODY LAYOUT ═══════════════════════ -->
  <div class="flex flex-1 overflow-hidden">

    <!-- ─── SIDEBAR ─── -->
    <aside id="sidebar" class="mobile-drawer w-56 bg-gray-900 border-r border-gray-800 flex flex-col p-3 gap-1 hidden md:flex flex-shrink-0 overflow-y-auto">
      <!-- Upload button -->
      <button id="uploadBtn"
        class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white text-sm font-medium transition mb-3 shadow-lg shadow-indigo-900/40">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        New Upload
      </button>
      <!-- Nav -->
      <nav class="space-y-0.5">
        <button data-section="drive" class="navItem w-full flex items-center gap-3 px-3 py-2 rounded-lg bg-indigo-600/15 text-indigo-300 text-sm font-medium cursor-pointer text-left">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
          My Drive
        </button>
        <button data-section="recent" class="navItem w-full flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-gray-200 text-sm transition cursor-pointer text-left">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Recent
        </button>
        <button data-section="starred" class="navItem w-full flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-gray-200 text-sm transition cursor-pointer text-left">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
          Starred
        </button>
        <button data-section="trash" class="navItem w-full flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-gray-200 text-sm transition cursor-pointer text-left">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          Trash
        </button>
      </nav>
      <!-- Storage bar -->
      <div class="mt-auto pt-4 border-t border-gray-800">
        <div class="flex justify-between text-xs text-gray-500 mb-1.5">
          <span>Storage</span>
          <span id="storageText">—</span>
        </div>
        <div class="w-full h-1.5 bg-gray-700 rounded-full overflow-hidden">
          <div id="storageBar" class="h-full bg-indigo-500 rounded-full transition-all duration-500" style="width:0%"></div>
        </div>
        <div id="fileCountText" class="text-xs text-gray-600 mt-1.5">0 files</div>
      </div>
    </aside>

    <!-- ─── MAIN CONTENT ─── -->
    <main class="flex-1 overflow-auto p-5">

      <!-- Drop Zone -->
      <div id="dropZone"
        class="border-2 border-dashed border-gray-700 rounded-2xl p-8 mb-5 text-center cursor-pointer group transition-all hover:border-indigo-500 hover:bg-indigo-500/5"
        tabindex="0" aria-label="Drop zone to upload files">
        <div class="flex flex-col items-center gap-2 pointer-events-none">
          <div class="w-12 h-12 rounded-2xl bg-gray-800 group-hover:bg-indigo-600/15 flex items-center justify-center transition">
            <svg class="w-6 h-6 text-gray-400 group-hover:text-indigo-400 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
          </div>
          <div class="text-gray-300">
            <span class="font-medium">Drop files here</span>
            <span class="text-gray-500"> or </span>
            <span class="text-indigo-400 group-hover:text-indigo-300 transition pointer-events-auto">
              <label class="cursor-pointer underline">
                browse
                <input id="fileInput" type="file" multiple class="hidden" />
              </label>
            </span>
          </div>
          <div class="text-xs text-gray-600">Images · Videos · Audio · Text · Any file type</div>
        </div>
      </div>

      <!-- Optional: encrypt on upload (uses /api/encrypt — not the plain upload) -->
      <div class="mb-5 rounded-xl border border-gray-800 bg-gray-900/40 px-4 py-3 flex flex-col gap-3">
        <label class="flex items-center gap-2 text-sm text-gray-300 cursor-pointer select-none">
          <input type="checkbox" id="encryptOnUpload" class="rounded border-gray-600 bg-gray-900 text-indigo-500 focus:ring-indigo-500" />
          <span><strong class="text-indigo-300">Encrypt</strong> uploads with a password (saves <code class="text-xs text-gray-500">.enc</code> files)</span>
        </label>
        <div id="encryptKeyRow" class="hidden flex flex-col sm:flex-row gap-2 sm:items-center">
          <input type="password" id="encryptKeyInput" placeholder="Encryption password" autocomplete="off"
            class="flex-1 min-w-0 bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-indigo-500" />
        </div>
        <p id="encryptHint" class="hidden text-xs text-emerald-200/80 leading-relaxed">
          The IV is stored inside each <code class="text-gray-400">.enc</code> file. To decrypt later, use the <strong>same password</strong> and the <strong>🔓</strong> button on the file (or <code class="text-gray-400">POST /api/decrypt</code> with <code class="text-gray-400">encryptedFileName</code> + <code class="text-gray-400">key</code> only).
        </p>
      </div>

      <!-- Type filter pills + sorting -->
      <div class="flex flex-col gap-3 mb-4">
        <div id="filterPills" class="flex gap-2 overflow-x-auto pb-1"></div>
        <div class="flex flex-wrap gap-2 items-center justify-between">
          <div class="flex items-center gap-2">
            <label class="text-xs text-gray-500">Sort</label>
            <select id="sortSelect" class="bg-gray-900 border border-gray-800 text-gray-300 text-xs rounded-lg px-2 py-1.5">
              <option value="name:asc">Name (A–Z)</option>
              <option value="name:desc">Name (Z–A)</option>
              <option value="uploaded:desc">Uploaded (newest)</option>
              <option value="uploaded:asc">Uploaded (oldest)</option>
              <option value="modified:desc" selected>Modified (newest)</option>
              <option value="modified:asc">Modified (oldest)</option>
              <option value="size:desc">Size (largest)</option>
              <option value="size:asc">Size (smallest)</option>
              <option value="type:asc">Type (A–Z)</option>
              <option value="type:desc">Type (Z–A)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Section header -->
      <div class="flex items-center justify-between mb-3">
        <h2 id="sectionTitle" class="text-xs font-semibold text-gray-400 uppercase tracking-widest">All Files</h2>
        <div class="flex items-center gap-1.5">
          <button id="btnGrid" onclick="setView('grid')"
            class="p-1.5 rounded-lg text-indigo-400 bg-indigo-600/15 transition" title="Grid view">
            <svg class="w-4 h-4" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5A1.5 1.5 0 012.5 1h3A1.5 1.5 0 017 2.5v3A1.5 1.5 0 015.5 7h-3A1.5 1.5 0 011 5.5v-3zm8 0A1.5 1.5 0 0110.5 1h3A1.5 1.5 0 0115 2.5v3A1.5 1.5 0 0113.5 7h-3A1.5 1.5 0 019 5.5v-3zm-8 8A1.5 1.5 0 012.5 9h3A1.5 1.5 0 017 10.5v3A1.5 1.5 0 015.5 15h-3A1.5 1.5 0 011 13.5v-3zm8 0A1.5 1.5 0 0110.5 9h3a1.5 1.5 0 011.5 1.5v3a1.5 1.5 0 01-1.5 1.5h-3A1.5 1.5 0 019 13.5v-3z"/></svg>
          </button>
          <button id="btnList" onclick="setView('list')"
            class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-gray-200 transition" title="List view">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
          </button>
        </div>
      </div>

      <!-- File container (grid or list) -->
      <div id="filesContainer"></div>

    </main>
  </div>

  <!-- ═══════════════════════ PREVIEW MODAL ═══════════════════════ -->
  <div id="previewModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4"
    onclick="handleModalBackdrop(event)">
    <div class="modal-panel bg-gray-900 rounded-2xl w-full max-w-5xl flex flex-col shadow-2xl border border-gray-800 overflow-hidden" style="max-height:92vh" onclick="event.stopPropagation()">
      <!-- Modal header -->
      <div class="flex items-center gap-3 px-5 py-4 border-b border-gray-800 flex-shrink-0">
        <span id="modalIcon" class="text-xl leading-none flex-shrink-0"></span>
        <span id="modalTitle" class="text-sm font-medium text-gray-100 truncate flex-1 min-w-0"></span>
        <span id="modalMeta" class="text-xs text-gray-500 flex-shrink-0 ml-2 hidden sm:block"></span>
        <div class="flex items-center gap-2 ml-3 flex-shrink-0">
          <button id="modalDownloadBtn"
            class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white text-xs font-medium transition">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Download
          </button>
          <button onclick="closePreview()"
            class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-700 hover:text-gray-200 transition">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      <!-- Modal body -->
      <div id="modalContent"
        class="flex-1 overflow-auto flex items-center justify-center p-5 min-h-0"
        style="max-height: calc(92vh - 72px)"></div>
    </div>
  </div>

  <!-- ═══════════════════════ TOAST CONTAINER ═══════════════════════ -->
  <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col-reverse gap-2 pointer-events-none items-end"></div>

  <!-- ═══════════════════════ MOBILE SIDEBAR OVERLAY ═══════════════════════ -->
  <div id="mobileOverlay" class="hidden fixed inset-0 bg-black/60 z-40 md:hidden"></div>

  <script>
  // ══════════════════════════════════════════════════════════════════
  //  FILE-TYPE REGISTRY
  // ══════════════════════════════════════════════════════════════════
  const FILE_TYPES = {
    image:       { exts: ['jpg','jpeg','png','gif','webp','svg','ico','bmp','tiff','tif','avif','heic'],             icon: '🖼️',  label: 'Images',    pillCls: 'bg-pink-500/10 text-pink-300 hover:bg-pink-500/20 border-pink-500/20' },
    video:       { exts: ['mp4','webm','mov','avi','mkv','m4v','ogv','flv','wmv','3gp'],                            icon: '🎬',  label: 'Videos',    pillCls: 'bg-purple-500/10 text-purple-300 hover:bg-purple-500/20 border-purple-500/20' },
    audio:       { exts: ['mp3','wav','ogg','flac','aac','m4a','opus','wma','mid','midi'],                          icon: '🎵',  label: 'Audio',     pillCls: 'bg-blue-500/10 text-blue-300 hover:bg-blue-500/20 border-blue-500/20' },
    text:        { exts: ['txt','md','markdown','csv','json','xml','html','htm','css','js','ts','jsx','tsx',
                          'py','java','cs','c','cpp','h','hpp','go','rs','rb','php','sh','bash','zsh',
                          'yaml','yml','toml','ini','cfg','conf','log','sql','env','gitignore','editorconfig'], icon: '📄', label: 'Text', pillCls: 'bg-green-500/10 text-green-300 hover:bg-green-500/20 border-green-500/20' },
    document:    { exts: ['pdf','doc','docx','ppt','pptx','odt','odp','rtf'],                                      icon: '📋',  label: 'Docs',      pillCls: 'bg-orange-500/10 text-orange-300 hover:bg-orange-500/20 border-orange-500/20' },
    spreadsheet: { exts: ['xls','xlsx','ods','numbers'],                                                           icon: '📊',  label: 'Sheets',    pillCls: 'bg-emerald-500/10 text-emerald-300 hover:bg-emerald-500/20 border-emerald-500/20' },
    archive:     { exts: ['zip','tar','gz','rar','7z','bz2','xz','zst'],                                           icon: '📦',  label: 'Archives',  pillCls: 'bg-yellow-500/10 text-yellow-300 hover:bg-yellow-500/20 border-yellow-500/20' },
    encrypted:   { exts: ['enc'],                                                                                  icon: '🔒',  label: 'Encrypted', pillCls: 'bg-red-500/10 text-red-300 hover:bg-red-500/20 border-red-500/20' },
  };
  const OTHER_TYPE = { type: 'other', icon: '📎', label: 'Other', pillCls: '' };

  function getFileType(name) {
    const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';
    for (const [type, info] of Object.entries(FILE_TYPES)) {
      if (info.exts.includes(ext)) return { type, ...info };
    }
    return { ...OTHER_TYPE };
  }

  // ══════════════════════════════════════════════════════════════════
  //  UTILITIES
  // ══════════════════════════════════════════════════════════════════
  function formatSize(bytes) {
    if (!bytes) return '0 B';
    const u = ['B','KB','MB','GB','TB'];
    const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), u.length - 1);
    return (bytes / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1) + ' ' + u[i];
  }

  function formatDate(iso) {
    const d = new Date(iso), now = new Date(), diff = now - d;
    if (diff < 60000)      return 'Just now';
    if (diff < 3600000)    return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000)   return Math.floor(diff / 3600000) + 'h ago';
    if (diff < 604800000)  return Math.floor(diff / 86400000) + 'd ago';
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric',
      year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ══════════════════════════════════════════════════════════════════
  //  STATE
  // ══════════════════════════════════════════════════════════════════
  let allFiles        = [];
  let currentView     = 'grid';
  let searchQuery     = '';
  let typeFilter      = 'all';
  let previewFile     = null;
  let currentSection  = 'drive'; // drive | recent | starred | trash
  let sortMode        = 'modified:desc';

  // ══════════════════════════════════════════════════════════════════
  //  TOAST
  // ══════════════════════════════════════════════════════════════════
  function showToast(msg, type = 'info') {
    const colors = {
      success: 'bg-emerald-800 border-emerald-700 text-emerald-100',
      error:   'bg-red-900   border-red-700   text-red-100',
      info:    'bg-gray-800  border-gray-700  text-gray-100',
      warning: 'bg-amber-800 border-amber-700 text-amber-100',
    };
    const icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };
    const el = document.createElement('div');
    el.className = `pointer-events-auto flex items-center gap-2.5 px-4 py-3 rounded-xl text-sm shadow-2xl border ${colors[type] || colors.info}`;
    el.style.cssText = 'opacity:0;transform:translateY(8px);transition:opacity .25s ease,transform .25s ease';
    el.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${esc(msg)}</span>`;
    document.getElementById('toastContainer').appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }));
    setTimeout(() => {
      el.style.opacity = '0';
      el.style.transform = 'translateY(8px)';
      setTimeout(() => el.remove(), 300);
    }, 3200);
  }

  // ══════════════════════════════════════════════════════════════════
  //  VIEW TOGGLE
  // ══════════════════════════════════════════════════════════════════
  function setView(v) {
    currentView = v;
    const active   = 'p-1.5 rounded-lg text-indigo-400 bg-indigo-600/15 transition';
    const inactive = 'p-1.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-gray-200 transition';
    document.getElementById('btnGrid').className = v === 'grid' ? active : inactive;
    document.getElementById('btnList').className = v === 'list' ? active : inactive;
    renderFilesFromState();
  }

  // ══════════════════════════════════════════════════════════════════
  //  FILTER PILLS
  // ══════════════════════════════════════════════════════════════════
  function renderFilterPills() {
    const counts = {};
    for (const f of allFiles) {
      const { type } = getFileType(f.name);
      counts[type] = (counts[type] || 0) + 1;
    }
    const available = Object.keys(FILE_TYPES).filter(t => counts[t]);
    const container = document.getElementById('filterPills');
    container.innerHTML = '';

    const pills = [['all', { icon: '📁', label: 'All', pillCls: 'bg-gray-700/60 text-gray-300 hover:bg-gray-700 border-gray-600' }],
                   ...available.map(t => [t, FILE_TYPES[t]])];

    for (const [key, info] of pills) {
      const btn = document.createElement('button');
      const isActive = typeFilter === key;
      btn.className = `flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium flex-shrink-0 transition border ${
        isActive ? 'bg-indigo-600 text-white border-indigo-500 shadow-lg shadow-indigo-900/30'
                 : (info.pillCls || 'bg-gray-800 text-gray-400 hover:bg-gray-700 border-transparent')
      }`;
      btn.innerHTML = `<span>${info.icon}</span><span>${info.label}</span>`;
      if (key !== 'all' && counts[key]) {
        btn.innerHTML += `<span class="ml-0.5 opacity-60">${counts[key]}</span>`;
      }
      btn.addEventListener('click', () => setTypeFilter(key));
      container.appendChild(btn);
    }
  }

  function setTypeFilter(type) {
    typeFilter = type;
    renderFilterPills();
    const info = FILE_TYPES[type];
    document.getElementById('sectionTitle').textContent =
      type === 'all' ? 'All Files' : `${info?.icon ?? ''} ${info?.label ?? 'Files'}`;
    renderFilesFromState();
  }

  // ══════════════════════════════════════════════════════════════════
  //  RENDER FILES
  // ══════════════════════════════════════════════════════════════════
  function getFiltered() {
    const now = Date.now();
    const sevenDaysMs = 7 * 24 * 60 * 60 * 1000;

    return allFiles.filter(f => {
      const isTrashed = !!f.trashed;
      if (currentSection === 'trash') {
        if (!isTrashed) return false;
      } else {
        if (isTrashed) return false;
      }

      if (currentSection === 'starred' && !f.starred) return false;

      if (currentSection === 'recent') {
        const d = new Date(f.modified || f.uploaded || 0).getTime();
        if (!d || (now - d) > sevenDaysMs) return false;
      }

      const matchType   = typeFilter === 'all' || getFileType(f.name).type === typeFilter;
      const matchSearch = !searchQuery  || f.name.toLowerCase().includes(searchQuery);
      return matchType && matchSearch;
    });
  }

  function compare(a, b, key, dir) {
    const s = dir === 'desc' ? -1 : 1;
    if (key === 'name') return a.name.localeCompare(b.name) * s;
    if (key === 'size') return ((a.size ?? 0) - (b.size ?? 0)) * s;
    if (key === 'type') return (getFileType(a.name).type.localeCompare(getFileType(b.name).type)) * s;
    if (key === 'uploaded') return (new Date(a.uploaded || 0) - new Date(b.uploaded || 0)) * s;
    if (key === 'modified') return (new Date(a.modified || 0) - new Date(b.modified || 0)) * s;
    return 0;
  }

  function renderFilesFromState() {
    const [sortKey, sortDir] = (sortMode || 'modified:desc').split(':');
    const filtered  = getFiltered().slice().sort((a,b) => compare(a,b,sortKey,sortDir));
    const container = document.getElementById('filesContainer');

    if (filtered.length === 0) {
      container.className = '';
      container.innerHTML = `
        <div class="flex flex-col items-center justify-center py-24 text-center">
          <div class="w-16 h-16 rounded-2xl bg-gray-800 flex items-center justify-center mb-4 text-3xl">📭</div>
          <div class="text-gray-400 font-medium">${searchQuery ? 'No results found' : 'No files here yet'}</div>
          <div class="text-gray-600 text-sm mt-1">${searchQuery ? 'Try a different search term' : 'Upload files to get started'}</div>
        </div>`;
      return;
    }

    if (currentView === 'grid') {
      container.className = 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3';
      container.innerHTML = '';
      for (const f of filtered) container.appendChild(createGridCard(f));
    } else {
      container.className = 'flex flex-col';
      container.innerHTML = `
        <div class="flex items-center gap-3 px-4 py-2 text-xs text-gray-600 font-medium uppercase tracking-wider border-b border-gray-800 mb-1">
          <span class="w-6"></span>
          <span class="flex-1">Name</span>
          <span class="w-24 text-right hidden sm:block">Modified</span>
          <span class="w-14 text-right">Size</span>
          <span class="w-20"></span>
        </div>`;
      for (const f of filtered) container.appendChild(createListRow(f));
    }
  }

  /* ─── Grid card ─── */
  function createGridCard(file) {
    const ti   = getFileType(file.name);
    const purl = `/api/preview/${encodeURIComponent(file.name)}`;

    const card = document.createElement('div');
    card.className = 'group relative bg-gray-800/50 hover:bg-gray-800 rounded-xl overflow-hidden cursor-pointer border border-gray-700/40 hover:border-indigo-500/50 transition-all select-none';

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'h-28 flex items-center justify-center overflow-hidden relative bg-gray-900/60';

    if (ti.type === 'image') {
      const img = document.createElement('img');
      img.src = purl;
      img.alt = file.name;
      img.loading = 'lazy';
      img.className = 'w-full h-full object-cover transition-transform duration-300 group-hover:scale-105';
      img.onerror = () => { thumb.innerHTML = ''; thumb.appendChild(iconDiv(ti.icon)); };
      thumb.appendChild(img);
    } else if (ti.type === 'video') {
      // Video thumbnail via the preview URL inside a tiny video element (poster frame)
      const vid = document.createElement('video');
      vid.src = purl;
      vid.muted = true;
      vid.preload = 'metadata';
      vid.className = 'w-full h-full object-cover';
      vid.addEventListener('loadedmetadata', () => { vid.currentTime = 1; });
      vid.onerror = () => { thumb.innerHTML = ''; thumb.appendChild(iconDiv(ti.icon)); };
      thumb.appendChild(vid);
      // Play icon overlay
      const overlay = document.createElement('div');
      overlay.className = 'absolute inset-0 flex items-center justify-center';
      overlay.innerHTML = '<div class="w-10 h-10 rounded-full bg-black/50 flex items-center justify-center"><svg class="w-5 h-5 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>';
      thumb.appendChild(overlay);
    } else {
      thumb.appendChild(iconDiv(ti.icon));
    }

    // Hover action buttons
    const actions = hoverActions(file);
    thumb.appendChild(actions);
    card.appendChild(thumb);

    // Info
    const info = document.createElement('div');
    info.className = 'p-2.5';
    info.innerHTML = `
      <div class="text-xs font-medium text-gray-200 truncate" title="${esc(file.name)}">${esc(file.name)}</div>
      <div class="flex items-center gap-1.5 mt-0.5 text-xs text-gray-500">
        <span>${formatSize(file.size)}</span>
        <span class="text-gray-700">·</span>
        <span>${formatDate(file.modified)}</span>
      </div>`;
    card.appendChild(info);

    card.addEventListener('click', e => { if (!e.target.closest('button')) openPreview(file); });
    return card;
  }

  /* ─── List row ─── */
  function createListRow(file) {
    const ti  = getFileType(file.name);
    const row = document.createElement('div');
    row.className = 'flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-gray-800/60 cursor-pointer group transition select-none';
    row.innerHTML = `
      <span class="text-lg w-6 flex-shrink-0 text-center leading-none">${ti.icon}</span>
      <span class="flex-1 text-sm text-gray-200 truncate min-w-0" title="${esc(file.name)}">${esc(file.name)}</span>
      <span class="w-24 text-right text-xs text-gray-500 flex-shrink-0 hidden sm:block">${formatDate(file.modified)}</span>
      <span class="w-14 text-right text-xs text-gray-500 flex-shrink-0">${formatSize(file.size)}</span>`;

    const acts = hoverActions(file);
    acts.className = 'w-28 flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0';
    row.appendChild(acts);
    row.addEventListener('click', e => { if (!e.target.closest('button')) openPreview(file); });
    return row;
  }

  /* ─── Helpers ─── */
  function iconDiv(icon) {
    const d = document.createElement('div');
    d.className = 'flex items-center justify-center w-full h-full';
    d.innerHTML = `<span class="text-4xl">${icon}</span>`;
    return d;
  }

  function hoverActions(file) {
    const wrap = document.createElement('div');
    wrap.className = 'absolute top-1.5 right-1.5 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity';
    const btnData = [
      ['👁️', 'Preview',  () => openPreview(file)],
      ['⬇️', 'Download', () => doDownload(file.name)],
    ];
    if (file.name.toLowerCase().endsWith('.enc')) {
      btnData.push(['🔓', 'Decrypt with password', () => decryptEncFile(file)]);
    }
    btnData.push(
      [file.starred ? '⭐' : '☆', file.starred ? 'Unstar' : 'Star', () => toggleStar(file)],
      [currentSection === 'trash' ? '↩️' : '🗑️', currentSection === 'trash' ? 'Restore' : 'Move to trash', () => toggleTrash(file)],
    );
    for (const [icon, title, fn] of btnData) {
      const btn = document.createElement('button');
      btn.className = 'w-6 h-6 rounded-md bg-gray-900/85 backdrop-blur-sm text-xs flex items-center justify-center hover:bg-gray-700 transition border border-gray-700/50';
      btn.title = title;
      btn.textContent = icon;
      btn.addEventListener('click', e => { e.stopPropagation(); fn(); });
      wrap.appendChild(btn);
    }
    return wrap;
  }

  // ══════════════════════════════════════════════════════════════════
  //  STORAGE INDICATOR
  // ══════════════════════════════════════════════════════════════════
  function updateStorageInfo(files) {
    const total = files.reduce((s, f) => s + f.size, 0);
    document.getElementById('storageText').textContent   = formatSize(total);
    document.getElementById('fileCountText').textContent = `${files.length} file${files.length !== 1 ? 's' : ''}`;
    const pct = Math.min(100, (total / (10 * 1024 ** 3)) * 100);
    document.getElementById('storageBar').style.width = pct.toFixed(1) + '%';
  }

  // ══════════════════════════════════════════════════════════════════
  //  API
  // ══════════════════════════════════════════════════════════════════
  async function refreshFiles() {
    try {
      const res = await fetch('/api/files?includeTrashed=true');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allFiles = await res.json();
      renderFilterPills();
      updateSectionTitle();
      renderFilesFromState();
      updateStorageInfo(allFiles);
    } catch (err) {
      showToast('Could not load files: ' + err.message, 'error');
    }
  }

  async function uploadFiles(fileList) {
    const files = Array.from(fileList || []);
    if (!files.length) return;

    const encrypt = document.getElementById('encryptOnUpload').checked;
    const key = (document.getElementById('encryptKeyInput').value || '').trim();

    if (encrypt) {
      if (!key) {
        showToast('Turn off Encrypt or enter a password.', 'warning');
        return;
      }
      showToast(`Encrypting ${files.length} file${files.length > 1 ? 's' : ''}…`, 'info');
      let okCount = 0;
      try {
        for (const f of files) {
          const fd = new FormData();
          fd.append('file', f);
          fd.append('key', key);
          const res = await fetch('/api/encrypt', { method: 'POST', body: fd });
          if (!res.ok) {
            showToast(`Encrypt failed (${f.name}): ` + (await res.text()), 'error');
            continue;
          }
          okCount++;
        }
        if (okCount) {
          showToast(`${okCount} encrypted — decrypt anytime with the same password (🔓 on the file)`, 'success');
        }
        await refreshFiles();
      } catch (err) {
        showToast('Encrypt error: ' + err.message, 'error');
      }
      return;
    }

    showToast(`Uploading ${files.length} file${files.length > 1 ? 's' : ''}…`, 'info');
    const fd = new FormData();
    for (const f of files) fd.append('files', f);
    try {
      const res = await fetch('/api/upload-multiple', { method: 'POST', body: fd });
      if (!res.ok) { showToast('Upload failed: ' + await res.text(), 'error'); return; }
      const saved = await res.json();
      showToast(`${saved.length} file${saved.length > 1 ? 's' : ''} uploaded`, 'success');
      await refreshFiles();
    } catch (err) {
      showToast('Upload error: ' + err.message, 'error');
    }
  }

  async function toggleStar(file) {
    try {
      const res = await fetch('/api/star/' + encodeURIComponent(file.name), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ starred: !file.starred })
      });
      if (!res.ok) { showToast('Star failed', 'error'); return; }
      await refreshFiles();
    } catch (err) {
      showToast('Star error: ' + err.message, 'error');
    }
  }

  async function toggleTrash(file) {
    try {
      if (file.trashed) {
        const res = await fetch('/api/restore/' + encodeURIComponent(file.name), { method: 'POST' });
        if (!res.ok) { showToast('Restore failed', 'error'); return; }
        showToast('Restored', 'success');
      } else {
        const res = await fetch('/api/trash/' + encodeURIComponent(file.name), { method: 'POST' });
        if (!res.ok) { showToast('Trash failed', 'error'); return; }
        showToast('Moved to trash', 'success');
      }
      await refreshFiles();
    } catch (err) {
      showToast('Trash error: ' + err.message, 'error');
    }
  }

  async function decryptEncFile(file) {
    const key = prompt('Enter the encryption password for:\n' + file.name);
    if (key === null) return;
    const trimmed = (key || '').trim();
    if (!trimmed) {
      showToast('Password required to decrypt.', 'warning');
      return;
    }
    showToast('Decrypting…', 'info');
    try {
      const fd = new FormData();
      fd.append('encryptedFileName', file.name);
      fd.append('key', trimmed);
      const res = await fetch('/api/decrypt', { method: 'POST', body: fd });
      const text = await res.text();
      if (!res.ok) {
        showToast(text || 'Decrypt failed', 'error');
        return;
      }
      const data = JSON.parse(text);
      showToast('Decrypted: ' + (data.fileName || 'OK'), 'success');
      await refreshFiles();
    } catch (err) {
      showToast('Decrypt error: ' + err.message, 'error');
    }
  }

  function doDownload(name) {
    const a = document.createElement('a');
    a.href     = '/api/download/' + encodeURIComponent(name);
    a.download = name;
    a.click();
  }

  // ══════════════════════════════════════════════════════════════════
  //  PREVIEW MODAL
  // ══════════════════════════════════════════════════════════════════
  async function openPreview(file) {
    previewFile = file;
    const ti   = getFileType(file.name);
    const purl = `/api/preview/${encodeURIComponent(file.name)}`;

    document.getElementById('modalIcon').textContent  = ti.icon;
    document.getElementById('modalTitle').textContent = file.name;
    document.getElementById('modalMeta').textContent  = formatSize(file.size) + ' · ' + formatDate(file.modified);
    document.getElementById('modalDownloadBtn').onclick = () => doDownload(file.name);

    const content = document.getElementById('modalContent');
    content.innerHTML = '<div class="text-gray-500 text-sm">Loading…</div>';
    content.style.alignItems = 'center';

    document.getElementById('previewModal').classList.remove('hidden');
    document.body.classList.add('modal-open');

    content.innerHTML = '';

    switch (ti.type) {

      case 'image': {
        content.classList.add('bg-gray-950/60');
        const img = document.createElement('img');
        img.src       = purl;
        img.alt       = file.name;
        img.className = 'max-w-full max-h-full object-contain rounded-xl';
        img.style.maxHeight = 'calc(92vh - 80px)';
        img.onerror = () => { content.innerHTML = noPreviewHTML(ti); attachNoPrevDl(); };
        content.appendChild(img);
        break;
      }

      case 'video': {
        const video = document.createElement('video');
        video.controls  = true;
        video.className = 'max-w-full rounded-xl';
        video.style.cssText = 'max-height:calc(92vh - 80px);accent-color:#6366f1';
        const src = document.createElement('source');
        src.src  = purl;
        video.appendChild(src);
        video.onerror = () => { content.innerHTML = noPreviewHTML(ti); attachNoPrevDl(); };
        content.appendChild(video);
        break;
      }

      case 'audio': {
        content.innerHTML = `
          <div class="flex flex-col items-center gap-6 py-10 w-full max-w-sm">
            <div class="w-32 h-32 rounded-full bg-gradient-to-br from-blue-600/30 to-indigo-600/40
                        border border-blue-500/30 flex items-center justify-center text-6xl
                        shadow-xl shadow-blue-900/20">🎵</div>
            <div class="text-center px-4">
              <div class="font-medium text-gray-200 text-sm break-all">${esc(file.name)}</div>
              <div class="text-xs text-gray-500 mt-1">${formatSize(file.size)}</div>
            </div>
            <audio controls class="w-full" style="accent-color:#6366f1">
              <source src="${purl}" />
              <p class="text-gray-500 text-sm">Audio not supported.</p>
            </audio>
          </div>`;
        break;
      }

      case 'text': {
        if (file.size > 2 * 1024 * 1024) {
          // File too large: don't fetch, just offer download
          content.innerHTML = `
            <div class="flex flex-col items-center gap-4 py-16 text-center">
              <div class="text-5xl">📄</div>
              <div>
                <div class="text-gray-300 font-medium">File too large for inline preview</div>
                <div class="text-gray-500 text-sm mt-1">${formatSize(file.size)} — download to view</div>
              </div>
            </div>`;
          attachNoPrevDl();
          break;
        }
        try {
          const res = await fetch(purl);
          if (!res.ok) throw new Error();
          let text = await res.text();
          if (text.length > 200_000) text = text.slice(0, 200_000) + '\n\n… [truncated]';
          const pre = document.createElement('pre');
          pre.className = 'w-full text-xs text-gray-300 font-mono bg-gray-950 rounded-xl p-5 leading-relaxed overflow-auto';
          pre.style.maxHeight = 'calc(92vh - 80px)';
          pre.textContent = text;
          content.style.alignItems = 'flex-start';
          content.innerHTML = '';
          content.appendChild(pre);
        } catch {
          content.innerHTML = noPreviewHTML(ti);
          attachNoPrevDl();
        }
        break;
      }

      default: {
        content.innerHTML = noPreviewHTML(ti);
        attachNoPrevDl();
        break;
      }
    }
  }

  function noPreviewHTML(ti) {
    return `
      <div class="flex flex-col items-center gap-4 py-16 text-center">
        <div class="w-20 h-20 rounded-2xl bg-gray-800 flex items-center justify-center text-5xl">${ti.icon}</div>
        <div>
          <div class="text-gray-300 font-medium">Preview not available</div>
          <div class="text-gray-500 text-sm mt-1">Download the file to open it</div>
        </div>
        <button id="noPrevDlBtn"
          class="flex items-center gap-2 px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Download File
        </button>
      </div>`;
  }

  function attachNoPrevDl() {
    const btn = document.getElementById('noPrevDlBtn');
    if (btn) btn.addEventListener('click', () => doDownload(previewFile.name));
  }

  function closePreview() {
    document.getElementById('previewModal').classList.add('hidden');
    document.body.classList.remove('modal-open');
    // Stop any playing media
    document.querySelectorAll('#modalContent video, #modalContent audio').forEach(m => m.pause());
    document.getElementById('modalContent').innerHTML = '';
    previewFile = null;
  }

  function handleModalBackdrop(e) {
    if (e.target === document.getElementById('previewModal')) closePreview();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePreview(); });

  // ══════════════════════════════════════════════════════════════════
  //  DRAG & DROP / FILE INPUT / SEARCH
  // ══════════════════════════════════════════════════════════════════
  const dropZone  = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  ['dragenter','dragover'].forEach(evt =>
    dropZone.addEventListener(evt, e => {
      e.preventDefault(); e.stopPropagation();
      dropZone.classList.replace('border-gray-700', 'border-indigo-500');
      dropZone.classList.add('bg-indigo-500/10');
    })
  );
  ['dragleave','drop'].forEach(evt =>
    dropZone.addEventListener(evt, e => {
      e.preventDefault(); e.stopPropagation();
      dropZone.classList.replace('border-indigo-500', 'border-gray-700');
      dropZone.classList.remove('bg-indigo-500/10');
    })
  );
  dropZone.addEventListener('drop', e =>
    uploadFiles(e.dataTransfer.files).catch(err => showToast('Upload failed: ' + err, 'error'))
  );
  fileInput.addEventListener('change', e => {
    uploadFiles(e.target.files).catch(err => showToast('Upload failed: ' + err, 'error'));
    e.target.value = '';
  });

  document.getElementById('uploadBtn').addEventListener('click', () => fileInput.click());

  document.getElementById('encryptOnUpload').addEventListener('change', e => {
    const on = e.target.checked;
    document.getElementById('encryptKeyRow').classList.toggle('hidden', !on);
    document.getElementById('encryptHint').classList.toggle('hidden', !on);
  });

  document.getElementById('sortSelect').addEventListener('change', e => {
    sortMode = e.target.value;
    renderFilesFromState();
  });

  function updateSectionTitle() {
    const titles = {
      drive: 'All Files',
      recent: 'Recent',
      starred: 'Starred',
      trash: 'Trash',
    };
    document.getElementById('sectionTitle').textContent = titles[currentSection] || 'All Files';
  }

  function setSection(section) {
    currentSection = section;
    document.querySelectorAll('.navItem').forEach(btn => {
      const isActive = btn.dataset.section === section;
      btn.className = 'navItem w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition cursor-pointer text-left ' +
        (isActive
          ? 'bg-indigo-600/15 text-indigo-300 font-medium'
          : 'text-gray-400 hover:bg-gray-800 hover:text-gray-200');
    });
    updateSectionTitle();
    renderFilesFromState();
    closeMobileMenu();
  }

  // Sidebar nav click
  document.querySelectorAll('.navItem').forEach(btn => btn.addEventListener('click', () => setSection(btn.dataset.section)));

  // Mobile hamburger / overlay
  const mobileOverlay = document.getElementById('mobileOverlay');
  const sidebar = document.getElementById('sidebar');
  function openMobileMenu() {
    mobileOverlay.classList.remove('hidden');
    sidebar.classList.remove('hidden');
    sidebar.classList.add('open');
    document.body.classList.add('modal-open');
  }
  function closeMobileMenu() {
    mobileOverlay.classList.add('hidden');
    sidebar.classList.remove('open');
    document.body.classList.remove('modal-open');
    if (window.matchMedia('(min-width: 768px)').matches) {
      sidebar.classList.remove('hidden');
    } else {
      // Wait for the slide-out transition, then hide the element.
      setTimeout(() => sidebar.classList.add('hidden'), 180);
    }
  }
  document.getElementById('hamburgerBtn').addEventListener('click', openMobileMenu);
  mobileOverlay.addEventListener('click', closeMobileMenu);
  window.addEventListener('resize', closeMobileMenu);

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase().trim();
    renderFilesFromState();
  });

  // ══════════════════════════════════════════════════════════════════
  //  INIT
  // ══════════════════════════════════════════════════════════════════
  setSection('drive');
  refreshFiles().catch(err => showToast('Failed to load: ' + err, 'error'));
  </script>
</body>
